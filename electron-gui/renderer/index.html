<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vibe Gamer</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: transparent;
      user-select: none;
      -webkit-app-region: no-drag;
    }

    .dot-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* ── Main orb — small, subtle, Apple-style ── */
    .main-orb {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      position: relative;
      cursor: pointer;
      -webkit-app-region: no-drag;
      outline: none;
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 10;
    }
    .main-orb:focus {
      outline: none;
    }
    .main-orb:focus-visible {
      outline: none;
    }

    /* Subtle pastel gradient ring — the Apple Intelligence look */
    .main-orb::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      background: conic-gradient(
        from 180deg,
        rgb(120, 60, 255) 0%,
        rgb(180, 80, 255) 14%,
        rgb(255, 100, 200) 28%,
        rgb(255, 160, 100) 42%,
        rgb(100, 220, 255) 57%,
        rgb(60, 180, 255) 71%,
        rgb(100, 120, 255) 85%,
        rgb(120, 60, 255) 100%
      );
      animation: orb-spin 8s linear infinite;
      z-index: -1;
      opacity: 1;
      transition: opacity 0.5s ease;
    }

    /* Glass highlight */
    .main-orb::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(
        ellipse at 38% 30%,
        rgba(220, 210, 255, 0.15) 0%,
        rgba(160, 150, 220, 0.04) 45%,
        transparent 70%
      );
      z-index: 2;
      pointer-events: none;
    }

    .orb-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: url('logo.png') center/75% no-repeat,
                  radial-gradient(
                    ellipse at 42% 38%,
                    rgba(20, 20, 34, 0.9) 0%,
                    rgba(10, 10, 22, 0.85) 50%,
                    rgba(4, 4, 14, 0.75) 100%
                  );
      backdrop-filter: blur(20px) saturate(150%);
      -webkit-backdrop-filter: blur(20px) saturate(150%);
      border: 1px solid rgba(180, 170, 240, 0.15);
    }

    .main-orb:hover {
      transform: scale(1.08);
    }

    .main-orb:hover::before {
      opacity: 1;
      filter: brightness(1.1);
    }

    .main-orb:active {
      transform: scale(0.92);
    }

    @keyframes orb-spin {
      to { transform: rotate(360deg); }
    }

    .main-orb.idle-pulse::before {
      animation: orb-spin 10s linear infinite, breathe 4s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { opacity: 0.8; }
      50% { opacity: 1; }
    }

    /* ── Sub-dots — smaller, matching subtle palette ── */
    .sub-dots-ring {
      position: absolute;
      width: 100%;
      height: 100%;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .sub-dots-ring.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .sub-dot {
      position: absolute;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      cursor: pointer;
      -webkit-app-region: no-drag;
      transform: scale(0) translate(-50%, -50%);
      transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1),
                  box-shadow 0.3s ease,
                  opacity 0.45s ease,
                  width 0.35s cubic-bezier(0.34, 1.56, 0.64, 1),
                  height 0.35s cubic-bezier(0.34, 1.56, 0.64, 1),
                  border-radius 0.35s cubic-bezier(0.34, 1.56, 0.64, 1),
                  left 0.35s cubic-bezier(0.34, 1.56, 0.64, 1),
                  top 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      opacity: 0;
      top: 50%;
      left: 50%;
    }

    .sub-dot.show {
      transform: scale(1) translate(-50%, -50%);
      opacity: 1;
    }

    /* Spinning pink ring on every sub-dot */
    .sub-dot::before {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      transition: border-radius 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      background: conic-gradient(
        from 180deg,
        rgb(120, 60, 255) 0%,
        rgb(180, 80, 255) 25%,
        rgb(100, 200, 255) 50%,
        rgb(180, 80, 255) 75%,
        rgb(120, 60, 255) 100%
      );
      z-index: -1;
      opacity: 0.85;
      animation: orb-spin 10s linear infinite;
    }

    .sub-dot:hover::before {
      opacity: 1;
      filter: brightness(1.2);
    }

    /* Hide the spinning ring only when task pill is open */
    #sub-task.task-expanded::before {
      display: none;
    }

    .sub-dot-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: radial-gradient(
        ellipse at 42% 38%,
        rgba(24, 24, 36, 0.78) 0%,
        rgba(10, 10, 20, 0.6) 60%,
        rgba(4, 4, 12, 0.4) 100%
      );
      backdrop-filter: blur(16px) saturate(140%);
      -webkit-backdrop-filter: blur(16px) saturate(140%);
      border: 1px solid rgba(180, 170, 240, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 2px;
    }

    .sub-dot-icon {
      font-size: 21px;
      line-height: 1;
    }

    .sub-dot-label {
      font-family: 'Segoe UI', -apple-system, system-ui, sans-serif;
      font-size: 10px;
      font-weight: 700;
      color: rgba(235, 230, 255, 0.95);
      letter-spacing: 0.4px;
    }

    .sub-dot:hover {
      transform: scale(1.12) translate(-50%, -50%) !important;
      box-shadow: 0 0 18px rgba(120, 60, 255, 0.35),
                  0 0 40px rgba(180, 80, 255, 0.15);
    }

    .sub-dot:active {
      transform: scale(0.92) translate(-50%, -50%) !important;
    }

    @keyframes scatter-out {
      0%   { transform: scale(1) translate(-50%, -50%); opacity: 1; }
      60%  { transform: scale(1.2) translate(-50%, -50%); opacity: 0.6; }
      100% { transform: scale(0) translate(-50%, -50%); opacity: 0; }
    }
    @keyframes pop-in {
      0%   { transform: scale(0) translate(-50%, -50%); opacity: 0; }
      70%  { transform: scale(1.15) translate(-50%, -50%); opacity: 1; }
      100% { transform: scale(1) translate(-50%, -50%); opacity: 1; }
    }
    .sub-dot.scatter {
      animation: scatter-out 0.32s cubic-bezier(0.4, 0, 0.8, 0.6) forwards;
    }
    .sub-dot.popin {
      animation: pop-in 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    /* Task dot expands into a pill bar with text input */
    .task-bar-inner {
      display: none;
      position: absolute;
      inset: 0;
      border-radius: inherit;
      align-items: center;
      justify-content: center;
      padding: 0 14px;
      box-sizing: border-box;
      background: radial-gradient(
        ellipse at 42% 38%,
        rgba(20, 60, 120, 0.55) 0%,
        rgba(10, 30, 80, 0.45) 60%,
        rgba(4, 14, 50, 0.35) 100%
      );
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
      border: 1px solid rgba(100, 180, 255, 0.18);
    }
    .sub-dot.task-expanded .sub-dot-inner {
      display: none;
    }
    .sub-dot.task-expanded .task-bar-inner {
      display: flex;
    }
    .sub-dot.task-expanded {
      width: 160px;
      height: 44px;
      border-radius: 22px;
      cursor: default;
    }
    .sub-dot.task-expanded:hover {
      transform: scale(1) translate(-50%, -50%) !important;
    }
    .task-input {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      font-family: 'Segoe UI', -apple-system, system-ui, sans-serif;
      font-size: 14px;
      color: rgba(240, 240, 255, 0.95);
    }
    .task-input::placeholder {
      color: rgba(180, 185, 210, 0.6);
    }
    .task-input:-webkit-autofill {
      -webkit-text-fill-color: rgba(240, 240, 255, 0.95);
    }
  </style>
</head>
<body>
  <div class="dot-container" id="dotContainer">
    <div class="sub-dots-ring" id="subDotsRing">
      <div class="sub-dot" id="sub-settings" data-action="settings">
        <div class="sub-dot-inner">
          <span class="sub-dot-icon">⚙</span>
          <span class="sub-dot-label">Settings</span>
        </div>
      </div>
      <div class="sub-dot" id="sub-task" data-action="task">
        <div class="sub-dot-inner">
          <span class="sub-dot-icon">⚡</span>
          <span class="sub-dot-label">Task</span>
        </div>
        <div class="task-bar-inner">
          <input type="text" class="task-input" id="taskInput" placeholder="Enter task..." autocomplete="off" />
        </div>
      </div>
      <div class="sub-dot" id="sub-mic" data-action="mic">
        <div class="sub-dot-inner">
          <span class="sub-dot-icon">🎙</span>
          <span class="sub-dot-label">Mic</span>
        </div>
      </div>
    </div>

    <div class="main-orb idle-pulse" id="mainOrb">
      <div class="orb-inner"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
